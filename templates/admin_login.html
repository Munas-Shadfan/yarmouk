<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Yarmouk AI</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --fg: #1d1d1f;
      --muted: #86868b;
      --card: #ffffff;
      --border: rgba(0,0,0,0.08);
      --primary: #10a37f;
      --primary-fg: #ffffff;
      --destructive: #ff3b30;
      --radius: 12px;
    }
    [data-theme="dark"] {
      --bg: #000000;
      --fg: #f5f5f7;
      --muted: #86868b;
      --card: #1c1c1e;
      --border: rgba(255,255,255,0.1);
      --primary: #10a37f;
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg: #000000; --fg: #f5f5f7; --muted: #86868b; --card: #1c1c1e; --border: rgba(255,255,255,0.1); --primary: #10a37f;
      }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
    }
    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: 4px;
    }
    .login-card p {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--fg);
    }
    input[type="text"],
    input[type="password"] {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--fg);
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: var(--primary); }
    .field { margin-bottom: 20px; }
    .btn-login {
      width: 100%;
      height: 44px;
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg {
      font-size: 13px;
      color: var(--destructive);
      margin-top: 16px;
      text-align: center;
      display: none;
    }
    .theme-toggle {
      position: absolute; top: 24px; right: 24px;
      background: none; border: none; cursor: pointer; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      padding: 8px; border-radius: 50%; transition: background 0.2s;
    }
    .theme-toggle:hover { background: var(--border); color: var(--fg); }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
    <svg id="sun-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <div class="login-card">
    <img src="/static/logo.png" alt="Yarmouk University" style="height:40px;width:auto;margin-bottom:20px;" />
    <h1>Admin dashboard</h1>
    <p>Sign in to manage the Yarmouk AI assistant</p>
    <form id="login-form">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="btn">Sign in</button>
      <div class="error-msg" id="error">Incorrect username or password</div>
    </form>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    const btn = document.getElementById('btn');

    form.onsubmit = async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const body = new URLSearchParams();
      body.append('username', form.username.value);
      body.append('password', form.password.value);

      try {
        const res = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body.toString(),
        });
        if (!res.ok) {
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Sign in';
          return;
        }
        const data = await res.json();
        localStorage.setItem('admin_token', data.access_token);
        window.location.href = '/admin';
      } catch {
        errorEl.textContent = 'Network error. Try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    };

    // If already logged in, redirect
    if (localStorage.getItem('admin_token')) {
      window.location.href = '/admin';
    }

    // Theme support
    const themeBtn = document.getElementById('theme-toggle');
    const moonIcon = document.getElementById('moon-icon');
    const sunIcon = document.getElementById('sun-icon');
    
    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('theme', theme);
      if (theme === 'dark') {
        moonIcon.classList.add('hidden');
        sunIcon.classList.remove('hidden');
      } else {
        sunIcon.classList.add('hidden');
        moonIcon.classList.remove('hidden');
      }
    }

    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(savedTheme);

    themeBtn.onclick = () => {
      const current = document.documentElement.getAttribute('data-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      setTheme(current === 'dark' ? 'light' : 'dark');
    };
  </script>
</body>
</html>
