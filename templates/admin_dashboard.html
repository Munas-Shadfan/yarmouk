<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Yarmouk AI</title>
  <style>
    :root {
      --primary: #10a37f;
      --primary-foreground: #ffffff;
      --background: #f5f5f7;
      --foreground: #1d1d1f;
      --card: #ffffff;
      --card-foreground: #1d1d1f;
      --muted: #e9e9eb;
      --muted-foreground: #86868b;
      --border: rgba(0,0,0,0.08);
      --radius-md: 10px;
      --radius-xl: 18px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --shadow-md: 0 12px 32px rgba(0,0,0,0.08);
      --glass: saturate(180%) blur(20px);
      --sidebar-w: 260px;
      --success: #34c759;
      --warning: #ff9f0a;
      --destructive: #ff3b30;
    }
    
    [data-theme="dark"] {
      --background: #000000;
      --foreground: #f5f5f7;
      --card: #1c1c1e;
      --card-foreground: #f5f5f7;
      --muted: #2c2c2e;
      --muted-foreground: #86868b;
      --border: rgba(255,255,255,0.1);
      --shadow-md: 0 12px 48px rgba(0,0,0,0.5);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --background: #000000; --foreground: #f5f5f7; --card: #1c1c1e; --card-foreground: #f5f5f7; --muted: #2c2c2e; --muted-foreground: #86868b; --border: rgba(255,255,255,0.1); --shadow-md: 0 12px 48px rgba(0,0,0,0.5);
      }
    }
    
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      display: flex;
      background: var(--background);
      color: var(--foreground);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: background 0.3s;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-w);
      background: var(--card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; z-index: 30;
    }
    .sidebar-brand {
      padding: 24px 20px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand span { font-size: 16px; font-weight: 800; letter-spacing: -0.01em; }
    .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--primary); }
    
    .sidebar-nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px; padding: 12px 16px;
      border-radius: 12px; font-size: 14px; font-weight: 600;
      color: var(--muted-foreground); cursor: pointer; border: none; background: none;
      width: 100%; text-align: start; transition: all 0.2s;
    }
    .nav-item:hover { background: var(--muted); color: var(--foreground); }
    .nav-item.active { background: rgba(16,163,127,0.1); color: var(--primary); }
    
    .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .avatar-circle { width: 36px; height: 36px; border-radius: 50%; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; }
    
    /* ── Main content ── */
    .main { margin-inline-start: var(--sidebar-w); flex: 1; min-height: 100dvh; }
    .top-bar {
      position: sticky; top: 0; z-index: 20; padding: 20px 40px;
      backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
      background: rgba(var(--nav-bg-rgb, 245, 245, 247), 0.72);
      border-bottom: 1px solid var(--border);
    }
    [data-theme="dark"] { --nav-bg-rgb: 0, 0, 0; }
    [data-theme="light"] { --nav-bg-rgb: 245, 245, 247; }
    
    .top-bar h2 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
    .page { padding: 40px; max-width: 1200px; }

    /* ── KPI Cards ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .kpi-card { background: var(--card); border-radius: 20px; padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
    .kpi-label { font-size: 12px; font-weight: 800; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .kpi-value { font-size: 32px; font-weight: 800; letter-spacing: -0.03em; }

    /* ── Table ── */
    .table-card { background: var(--card); border-radius: 20px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
    .table-header { padding: 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-header h3 { font-size: 18px; font-weight: 800; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: start; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted-foreground); padding: 16px 24px; background: var(--muted); }
    tbody td { padding: 16px 24px; font-size: 14px; border-bottom: 1px solid var(--border); }

    /* ── MOBILE RESPONSIVENESS ── */
    @media (max-width: 900px) {
      .sidebar { transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
      .sidebar.open { transform: translateX(0); }
      .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 25; display: none; }
      .sidebar-overlay.open { display: block; }
      .main { margin-inline-start: 0; }
      #hamburger { display: block !important; }
      .top-bar { padding: 16px 20px 16px 64px; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
      .page { padding: 20px; }
    }
    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: 1fr; }
      .table-card { overflow-x: auto; }
      table { min-width: 500px; }
    }
    #hamburger {
      display: none; position: fixed; left: 14px; top: 14px; z-index: 40;
      width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--card); color: var(--foreground); cursor: pointer;
      align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<button id="hamburger"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-dot"></div>
    <span>Yarmouk AI</span>
  </div>
  <nav class="sidebar-nav">
    <button class="nav-item active">Overview</button>
    <button class="nav-item">Knowledge Base</button>
    <button class="nav-item">Conversations</button>
    <button class="nav-item">Analytics</button>
  </nav>
  <div class="sidebar-footer">
    <div class="avatar-circle">A</div>
    <div style="flex:1">
        <div style="font-size:14px;font-weight:700">Admin</div>
        <div style="font-size:12px;color:var(--muted-foreground)">System Overseer</div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="top-bar">
    <h2>Overview</h2>
  </div>
  <div class="page">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-label">Active Users</div><div class="kpi-value">1,248</div></div>
      <div class="kpi-card"><div class="kpi-label">Avg. Response</div><div class="kpi-value">1.2s</div></div>
      <div class="kpi-card"><div class="kpi-label">Total Chats</div><div class="kpi-value">14,892</div></div>
      <div class="kpi-card"><div class="kpi-label">CSAT</div><div class="kpi-value">4.9</div></div>
    </div>

    <div class="table-card">
      <div class="table-header"><h3>Recent Activity</h3></div>
      <table>
        <thead><tr><th>User</th><th>Topic</th><th>Status</th><th>Time</th></tr></thead>
        <tbody>
          <tr><td>Ahmad H.</td><td>Admission requirements</td><td>Resolved</td><td>2m ago</td></tr>
          <tr><td>Sara M.</td><td>Scholarship application</td><td>Pending</td><td>5m ago</td></tr>
          <tr><td>Omar F.</td><td>IT department location</td><td>Resolved</td><td>12m ago</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script>
  const toggleBtn = document.createElement('button');
  const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', savedTheme);
  
  const hamburger = document.getElementById('hamburger');
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  
  function toggleAdminSidebar() {
    sidebar.classList.toggle('open');
    overlay.classList.toggle('open');
  }
  
  if (hamburger) hamburger.onclick = toggleAdminSidebar;
  if (overlay) overlay.onclick = toggleAdminSidebar;
</script>
</body>
</html>
