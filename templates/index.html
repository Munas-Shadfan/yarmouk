<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yarmouk AI Assistant</title>
  <meta name="description" content="A clean, minimalist AI assistant interface." />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #10a37f;
      --primary-foreground: #ffffff;
      --background: #ffffff;
      --foreground: #1d1d1f;
      --card: #ffffff;
      --card-foreground: #1d1d1f;
      --muted: #f5f5f7;
      --muted-foreground: #86868b;
      --border: rgba(0,0,0,0.08);
      --radius-md: 8px;
      --radius-xl: 16px;
      --shadow-sm: 0 1px 4px rgba(0,0,0,0.04), 0 0 1px rgba(0,0,0,0.04);
      --glass: saturate(180%) blur(20px);
    }

    [data-theme="dark"] {
      --background: #000000;
      --foreground: #f5f5f7;
      --card: #1c1c1e;
      --card-foreground: #f5f5f7;
      --muted: #1c1c1e;
      --muted-foreground: #86868b;
      --border: rgba(255,255,255,0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --background: #000000; --foreground: #f5f5f7; --card: #1c1c1e; --muted: #1c1c1e; --border: rgba(255,255,255,0.1);
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      height: 100vh;
      width: 100vw;
      background: var(--background);
      color: var(--foreground);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Sidebar --- */
    aside {
      width: 280px;
      background: var(--muted);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 10;
      backdrop-filter: var(--glass);
      transition: background 0.3s;
    }
    
    [data-theme="dark"] aside { background: rgba(10, 10, 10, 0.8); }

    .sidebar-header { padding: 20px 16px; border-bottom: 1px solid var(--border); }
    .btn-new-chat {
      width: 100%;
      height: 40px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--foreground);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: var(--shadow-sm);
    }
    .btn-new-chat:hover { transform: translateY(-1px); border-color: var(--primary); }
    .btn-new-chat:active { transform: scale(0.98); }

    .history-label { 
      font-size: 11px; font-weight: 800; text-transform: uppercase; 
      letter-spacing: 0.08em; color: var(--muted-foreground); 
      padding: 24px 16px 8px; 
    }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 8px 20px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--foreground);
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
    }
    .history-item svg { width: 14px; height: 14px; color: var(--muted-foreground); opacity: 0.7; }
    .history-item:hover { background: rgba(0,0,0,0.04); }
    [data-theme="dark"] .history-item:hover { background: rgba(255,255,255,0.06); }
    .history-item.active { background: rgba(0,0,0,0.06); color: var(--primary); }
    [data-theme="dark"] .history-item.active { background: rgba(255,255,255,0.1); }

    /* --- Main Chat Area --- */
    #app {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--background);
      position: relative;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      min-height: 60px;
      border-bottom: 1px solid var(--border);
      background: rgba(var(--hdr-bg, 255, 255, 255), 0.8);
      backdrop-filter: var(--glass);
      -webkit-backdrop-filter: var(--glass);
      position: sticky; top: 0; z-index: 20;
    }
    [data-theme="dark"] header { --hdr-bg: 0, 0, 0; }
    header h1 { font-size: 16px; font-weight: 700; color: var(--foreground); display: flex; align-items: center; gap: 10px; margin: 0 auto; letter-spacing: -0.01em; }
    header .header-right { position: absolute; right: 24px; display: flex; align-items: center; }
    header img.logo { height: 28px; width: auto; border-radius: 4px; }
    
    .theme-toggle {
      background: none; border: none; cursor: pointer; color: var(--muted-foreground);
      display: flex; align-items: center; justify-content: center;
      padding: 8px; border-radius: 50%; transition: background 0.2s;
    }
    .theme-toggle:hover { background: var(--border); color: var(--foreground); }
    .hidden { display: none !important; }

    .chat-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      overflow: hidden;
    }

    /* --- MOBILE SIDEBAR --- */
    @media (max-width: 768px) {
      aside {
        position: fixed; left: -280px; top: 0; bottom: 0;
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 100;
        box-shadow: 20px 0 60px rgba(0,0,0,0.1);
      }
      aside.open { transform: translateX(280px); }
      .sidebar-overlay { 
        position: fixed; inset: 0; background: rgba(0,0,0,0.4); 
        z-index: 90; display: none; opacity: 0; transition: opacity 0.3s;
      }
      .sidebar-overlay.open { display: block; opacity: 1; }
      #app { margin-left: 0; }
      header h1 { font-size: 14px; }
      .msg-content { width: 95%; gap: 12px; }
    }
    
    #menu-toggle {
        display: none; position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
        background: none; border: none; cursor: pointer; color: var(--foreground);
    }
    @media (max-width: 768px) { #menu-toggle { display: block; } }

    #chat-container {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding-bottom: 60px;
    }

    /* --- Message Rows --- */
    .msg-row {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 32px 0;
    }
    .msg-row.user {
      background: var(--muted);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .msg-content {
      max-width: 800px;
      width: 90%;
      display: flex;
      gap: 20px;
      font-size: 15.5px;
      line-height: 1.6;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .user .avatar { background: var(--foreground); color: var(--background); }
    .ai .avatar { background: var(--primary); color: #ffffff; }
    
    .bubble { flex: 1; color: var(--foreground); }
    .bubble p { margin-bottom: 16px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { margin-bottom: 16px; padding-left: 20px; }
    .bubble li { margin-bottom: 8px; }
    .bubble pre { background: var(--muted); padding: 16px; border-radius: 8px; overflow-x: auto; border: 1px solid var(--border); margin: 12px 0; font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 13px; }
    .bubble code { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace; font-size: 0.9em; background: rgba(0,0,0,0.06); padding: 2px 5px; border-radius: 4px; }
    [data-theme="dark"] .bubble code { background: rgba(255,255,255,0.1); }

    /* --- Input Area --- */
    footer {
      width: 100%;
      padding: 0 0 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(to top, var(--background) 70%, transparent);
    }
    .input-container {
      max-width: 800px;
      width: 90%;
      position: relative;
    }
    .input-wrapper {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      display: flex;
      align-items: flex-end;
      padding: 12px 16px;
      gap: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.06);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: var(--primary);
      box-shadow: 0 10px 40px rgba(16,163,127,0.1), 0 0 0 4px rgba(16,163,127,0.05);
    }

    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--foreground);
      font-size: 16px;
      padding: 4px 0;
      resize: none;
      max-height: 200px;
      line-height: 1.5;
    }

    .btn-send {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--primary);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      transition: all 0.2s;
    }
    .btn-send:hover:not(:disabled) { transform: translateY(-1px); filter: brightness(1.1); }
    .btn-send:active { transform: scale(0.95); }
    .btn-send:disabled { background: var(--muted); color: var(--muted-foreground); cursor: not-allowed; }

    .footer-note { 
      font-size: 12px; color: var(--muted-foreground); 
      margin-top: 12px; text-align: center; font-weight: 500; 
    }

    /* --- Thinking Indicator --- */
    .thinking-indicator {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 0;
    }
    .thinking-dots {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .thinking-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      display: inline-block;
      animation: thinking-bounce 1.4s infinite ease-in-out both;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinking-bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1.0); opacity: 1;   }
    }
    .status-text {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--muted-foreground);
      letter-spacing: -0.01em;
    }

    /* ── Empty state ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    #empty-state .empty-logo {
      width: 64px; height: 64px; border-radius: 20px;
      background: rgba(16,163,127,0.1); border: 1px solid rgba(16,163,127,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 24px;
      box-shadow: 0 4px 20px rgba(16,163,127,0.12);
    }
    #empty-state h2 {
      font-size: 22px; font-weight: 800; letter-spacing: -0.02em;
      margin-bottom: 8px; color: var(--foreground);
    }
    #empty-state p {
      font-size: 15px; color: var(--muted-foreground); margin-bottom: 32px; font-weight: 500;
    }
    .suggestions {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; max-width: 560px; width: 100%;
    }
    .suggestion-btn {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 16px;
      font-size: 13.5px; font-weight: 600; color: var(--foreground);
      cursor: pointer; text-align: start; line-height: 1.4;
      transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .suggestion-btn:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,163,127,0.1); }
    .suggestion-btn:active { transform: scale(0.98); }
    @media (max-width: 600px) { .suggestions { grid-template-columns: 1fr; } }

    /* RTL support for Arabic */
    .bubble.rtl { direction: rtl; text-align: right; }

    /* Tool-use pill */
    .tool-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      color: var(--primary);
      background: rgba(16, 163, 127, 0.08);
      border: 1px solid rgba(16, 163, 127, 0.2);
      box-shadow: 0 2px 6px rgba(16,163,127,0.04);
    }
    .tool-pill svg { flex-shrink: 0; }
  </style>
</head>
<body>
<aside>
  <div class="sidebar-header">
    <button id="new-chat-btn" class="btn-new-chat">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      New chat
    </button>
  </div>
  <div class="history-label">Recent conversations</div>
  <div id="history-list"></div>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<div id="app">
  <header>
    <button id="menu-toggle"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <h1><img src="/static/logo.png" alt="Yarmouk University" class="logo" /> Yarmouk AI</h1>
    <div class="header-right">
      <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">
        <svg id="sun-icon" class="hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <div class="chat-wrapper">
    <main id="chat-container">
      <div id="empty-state">
        <div class="empty-logo">🎓</div>
        <h2>How can I help you today?</h2>
        <p>Ask anything about Yarmouk University — in Arabic or English</p>
        <div class="suggestions">
          <button class="suggestion-btn">📅 What are the important dates this semester?</button>
          <button class="suggestion-btn">📚 What majors does Yarmouk offer?</button>
          <button class="suggestion-btn">🏛️ How do I apply for admission?</button>
          <button class="suggestion-btn">📍 What services does the library provide?</button>
        </div>
      </div>
    </main>
    
    <footer>
      <div class="input-container">
        <div class="input-wrapper">
          <form id="chat-form" style="flex:1">
            <textarea id="chat-input" rows="1" placeholder="Ask anything about Yarmouk university..." autocomplete="off"></textarea>
          </form>
          <button type="submit" form="chat-form" id="send-btn" class="btn-send" title="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
          </button>
        </div>
        <div class="footer-note">AI can make mistakes. Check important info.</div>
      </div>
    </footer>
  </div>
</div>

<script>
  marked.setOptions({ breaks: true, gfm: true });
  const form = document.getElementById('chat-form');
  const input = document.getElementById('chat-input');
  const container = document.getElementById('chat-container');
  const historyList = document.getElementById('history-list');
  const newChatBtn = document.getElementById('new-chat-btn');
  const sendBtn = document.getElementById('send-btn');

  const urlParams = new URLSearchParams(window.location.search);
  let threadId = urlParams.get('thread_id') || localStorage.getItem('chat_thread_id') || newThreadId();
  let isReceiving = false;

  function newThreadId() {
    const id = 'th_' + Date.now();
    localStorage.setItem('chat_thread_id', id);
    const threads = JSON.parse(localStorage.getItem('chat_threads') || '[]');
    if (!threads.includes(id)) {
      threads.unshift(id);
      localStorage.setItem('chat_threads', JSON.stringify(threads.slice(0, 50)));
    }
    return id;
  }

  async function loadHistory() {
    try {
      let localThreads = JSON.parse(localStorage.getItem('chat_threads') || '[]');
      if (!localThreads.includes(threadId)) {
        localThreads.unshift(threadId);
        localStorage.setItem('chat_threads', JSON.stringify(localThreads.slice(0, 50)));
      }

      historyList.innerHTML = '';
      if (localThreads.length === 0) {
        historyList.innerHTML = '<div style="padding:16px;font-size:13px;color:var(--muted-foreground);text-align:center">No conversation history.</div>';
        return;
      }

      const labels = JSON.parse(localStorage.getItem('chat_labels') || '{}');
      localThreads.forEach(id => {
        const item = document.createElement('div');
        item.className = 'history-item' + (id === threadId ? ' active' : '');
        const label = labels[id] || 'New conversation';
        item.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          ${escapeHtml(label.slice(0, 40))}
        `;
        item.onclick = () => switchThread(id);
        historyList.appendChild(item);
      });
    } catch (e) {
      console.error('History failed', e);
    }
  }

  function attachSuggestions() {
    document.querySelectorAll('.suggestion-btn').forEach(btn => {
      btn.onclick = () => {
        input.value = btn.textContent.replace(/^[^\w\u0600-\u06FF]+/, '').trim();
        input.dispatchEvent(new Event('input'));
        form.requestSubmit();
      };
    });
  }
  attachSuggestions();

  async function switchThread(id) {
    if (isReceiving) return;
    threadId = id;
    localStorage.setItem('chat_thread_id', id);
    container.innerHTML = '';
    loadHistory();
    try {
      const res = await fetch(`/api/messages/${id}`);
      if (!res.ok) return;
      const data = await res.json();
      data.messages.forEach(m => {
          if (m.type === 'human' || m.role === 'user') appendRow('user', m.content);
          else if (m.type === 'ai' || m.role === 'ai' || m.role === 'assistant') appendRow('ai', m.content);
      });
    } catch (e) {}
  }

  function isRTL(text) {
    return /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF]/.test(text);
  }

  function appendRow(role, text) {
    // Hide empty state on first message
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.remove();

    const row = document.createElement('div');
    row.className = 'msg-row ' + (role.includes('human') || role === 'user' ? 'user' : 'ai');
    const content = document.createElement('div');
    content.className = 'msg-content';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = (role.includes('human') || role === 'user') ? 'U' : 'AI';
    const bubble = document.createElement('div');
    const rtl = isRTL(text);
    bubble.className = 'bubble' + (rtl ? ' rtl' : '');
    bubble.innerHTML = (role.includes('human') || role === 'user') ? escapeHtml(text) : marked.parse(text);
    content.appendChild(avatar);
    content.appendChild(bubble);
    row.appendChild(content);
    container.appendChild(row);
    scrollToBottom();
    return bubble;
  }

  function appendAiThinkingRow() {
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    const content = document.createElement('div');
    content.className = 'msg-content';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    const indicator = document.createElement('div');
    indicator.className = 'thinking-indicator';
    indicator.innerHTML = `
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span class="status-text">Thinking…</span>
    `;
    const pillsDiv = document.createElement('div');
    pillsDiv.className = 'tool-pills';
    pillsDiv.style.display = 'none';
    const textDiv = document.createElement('div');
    textDiv.className = 'bubble-text';
    textDiv.style.display = 'none';
    bubble.appendChild(indicator);
    bubble.appendChild(pillsDiv);
    bubble.appendChild(textDiv);
    content.appendChild(avatar);
    content.appendChild(bubble);
    row.appendChild(content);
    container.appendChild(row);
    scrollToBottom();
    const statusText = indicator.querySelector('.status-text');
    const toolsSeen = new Set();
    return {
      setStatus(label) { statusText.textContent = label; },
      addToolPill(label) {
        if (toolsSeen.has(label)) return;
        toolsSeen.add(label);
        const isSearch = label.toLowerCase().includes('search');
        const icon = isSearch
          ? `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`
          : `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
        const pill = document.createElement('div');
        pill.className = 'tool-pill';
        pill.innerHTML = icon + escapeHtml(label.replace('…', ''));
        pillsDiv.appendChild(pill);
        pillsDiv.style.display = 'block';
      },
      startText() { indicator.style.display = 'none'; textDiv.style.display = ''; },
      textDiv,
    };
  }

  function scrollToBottom() { container.scrollTop = container.scrollHeight; }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = input.scrollHeight + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
  });

  newChatBtn.onclick = () => {
    threadId = newThreadId();
    container.innerHTML = '';
    // Restore empty state
    const es = document.createElement('div');
    es.id = 'empty-state';
    es.innerHTML = `
      <div class="empty-logo">🎓</div>
      <h2>How can I help you today?</h2>
      <p>Ask anything about Yarmouk University — in Arabic or English</p>
      <div class="suggestions">
        <button class="suggestion-btn">📅 What are the important dates this semester?</button>
        <button class="suggestion-btn">📚 What majors does Yarmouk offer?</button>
        <button class="suggestion-btn">🏛️ How do I apply for admission?</button>
        <button class="suggestion-btn">📍 What services does the library provide?</button>
      </div>`;
    container.appendChild(es);
    attachSuggestions();
    loadHistory();
  };

  form.onsubmit = async (e) => {
    e.preventDefault();
    if (isReceiving) return;
    const q = input.value.trim();
    if (!q) return;
    input.value = '';
    input.style.height = 'auto';
    // Save first message as the conversation label
    const labels = JSON.parse(localStorage.getItem('chat_labels') || '{}');
    if (!labels[threadId]) {
      labels[threadId] = q;
      localStorage.setItem('chat_labels', JSON.stringify(labels));
    }
    appendRow('user', q);
    isReceiving = true;
    sendBtn.disabled = true;
    const ai = appendAiThinkingRow();
    let rawText = '';
    let inThinkingMode = true;
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query: q, thread_id: threadId }),
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      outer: while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();
        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          let event;
          try { event = JSON.parse(part.slice(6)); } catch { continue; }
          if (event.type === 'done') break outer;
          if (event.type === 'status') {
            ai.setStatus(event.label);
            if (event.label !== 'Thinking\u2026') ai.addToolPill(event.label);
          }
          if (event.type === 'token') {
            if (inThinkingMode) { ai.startText(); inThinkingMode = false; }
            rawText += event.text;
            ai.textDiv.innerHTML = marked.parse(rawText);
            scrollToBottom();
          }
          if (event.type === 'error') {
            if (inThinkingMode) { ai.startText(); inThinkingMode = false; }
            ai.textDiv.innerHTML = `<span style="color:#ff3b30">${escapeHtml(event.text)}</span>`;
            scrollToBottom();
          }
        }
      }
    } catch (err) {
      if (inThinkingMode) ai.startText();
      ai.textDiv.textContent = 'Something went wrong. Please try again.';
    } finally {
      isReceiving = false;
      sendBtn.disabled = false;
      loadHistory();
    }
  };

  const toggleBtn = document.getElementById('theme-toggle');
  const moonIcon = document.getElementById('moon-icon');
  const sunIcon = document.getElementById('sun-icon');
  
  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    if (theme === 'dark') {
      moonIcon.classList.add('hidden');
      sunIcon.classList.remove('hidden');
    } else {
      sunIcon.classList.add('hidden');
      moonIcon.classList.remove('hidden');
    }
  }

  const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  setTheme(savedTheme);
  toggleBtn.onclick = () => {
    const current = document.documentElement.getAttribute('data-theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    setTheme(current === 'dark' ? 'light' : 'dark');
  };

  const menuToggle = document.getElementById('menu-toggle');
  const aside = document.querySelector('aside');
  const overlay = document.getElementById('sidebar-overlay');
  
  function toggleSidebar() {
      aside.classList.toggle('open');
      overlay.classList.toggle('open');
  }
  
  if (menuToggle) menuToggle.onclick = toggleSidebar;
  if (overlay) overlay.onclick = toggleSidebar;
  
  loadHistory();
  if (urlParams.get('thread_id') || localStorage.getItem('chat_thread_id')) {
    switchThread(threadId);
  }
</script>
</body>
</html>
